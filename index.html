<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM 遊戲庫統計系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://gs.jurieo.com/gemini/gstatic/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://gs.jurieo.com/gemini/gstatic/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://gs.jurieo.com/gemini/gstatic/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #02040a; 
            color: #fff;
            margin: 0;
            overflow-x: hidden;
            font-size: 16px;
            user-select: none;
            -webkit-user-select: none;
        }

        input, textarea, select, .selectable-cell {
            user-select: text;
            -webkit-user-select: text;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0d1117; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
        
        .animate-text-shimmer {
            background: linear-gradient(to right, #818cf8, #22d3ee, #fb7185, #818cf8);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .dragging {
            opacity: 0.5;
            background: rgba(79, 70, 229, 0.2) !important;
        }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .dlc-indent {
            padding-left: 2.5rem !important;
            position: relative;
        }
        .dlc-indent::before {
            content: ""; position: absolute; left: 1.25rem; top: 0; bottom: 50%; width: 2px; background: #1e293b;
        }
        .dlc-indent::after {
            content: ""; position: absolute; left: 1.25rem; top: 50%; width: 1rem; height: 2px; background: #1e293b;
        }
        .mode-locked .edit-only { display: none !important; }

        .search-suggestion-item:hover {
            background: rgba(34, 211, 238, 0.1);
            color: #22d3ee;
        }
        
        .filter-active {
            box-shadow: 0 0 15px currentColor;
            transform: scale(1.05);
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
        }

        .modal-field-container {
            display: grid;
            grid-template-cols: 70px 1fr;
            align-items: center;
            gap: 0.5rem;
        }
        .modal-input-base {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom: 2px solid #1e293b;
            padding: 0.5rem 0.75rem;
            transition: all 0.3s ease;
        }
        .modal-input-base:focus {
            border-bottom-color: #22d3ee;
            background: rgba(0,0,0,0.6);
            outline: none;
        }

        .achievement-bar-wrapper {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.8);
            height: 16px;
            border-radius: 9999px;
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 150px;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease-in-out, stroke 0.3s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, memo, useCallback } = React;
        
        const isClient = typeof window !== 'undefined';
        const APP_ID = 'steam-stats-v4';

        const formatDate = (ts) => { 
            if (!ts) return "LIVE"; 
            const date = ts instanceof firebase.firestore.Timestamp ? new Date(ts.toMillis()) : new Date(ts); 
            if(isNaN(date.getTime())) return "NOW";
            return `${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`; 
        };

        const compressImage = (dataUrl, maxWidth = 400) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = dataUrl;
            });
        };

        const safeGetStorage = (key, fallback) => {
            if (!isClient) return fallback;
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : fallback;
            } catch (e) { return fallback; }
        };
        const safeSetStorage = (key, value) => {
            if (!isClient) return;
            try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDNYdJPpz9_7nC8eqdKxzQw3r_HSuc95ck",
            authDomain: "steam2-43c65.firebaseapp.com",
            projectId: "steam2-43c65",
            storageBucket: "steam2-43c65.firebasestorage.app",
            messagingSenderId: "724393722543",
            appId: "1:724393722543:web:2824b735551700f080ca5a"
        };

        if (isClient && !firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = isClient ? firebase.firestore() : null;
        const auth = isClient ? firebase.auth() : null;

        const Icon = memo(({ name, className, onClick, title }) => (
            <span 
                onClick={(e) => { if(onClick) { e.stopPropagation(); onClick(e); } }} 
                className={`inline-flex items-center justify-center cursor-pointer ${className || ''}`}
                title={title}
            >
                <i data-lucide={name} className="w-full h-full"></i>
            </span>
        ));

        const LocalNumberInput = ({ defaultValue, onConfirm, className, placeholder }) => {
            const [val, setVal] = useState(defaultValue || 0);
            useEffect(() => { setVal(defaultValue || 0); }, [defaultValue]);

            return (
                <input 
                    type="number" 
                    value={val} 
                    className={className} 
                    placeholder={placeholder}
                    onChange={(e) => setVal(e.target.value)} 
                    onBlur={() => { if(val !== defaultValue) onConfirm(val); }} 
                />
            );
        };

        const AchievementBar = memo(({ completed = 0, total = 0, onClick, isEditLocked }) => {
            const totalNum = parseInt(total) || 0;
            const completedNum = parseInt(completed) || 0;

            if (isEditLocked && totalNum === 0) return <div className="h-9"></div>;

            const percentage = totalNum > 0 ? Math.min(Math.round((completedNum / totalNum) * 100), 100) : 0;

            let barColorClass = "bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.4)]"; 
            if (totalNum > 0) {
                if (percentage === 100) {
                    barColorClass = "bg-lime-400 shadow-[0_0_12px_rgba(163,230,53,0.4)]";
                }
                else if (percentage >= 50) {
                    barColorClass = "bg-yellow-400 shadow-[0_0_12px_rgba(250,204,21,0.4)]";
                }
            } else {
                barColorClass = "bg-slate-700 opacity-20"; 
            }

            return (
                <div 
                    className={`flex items-center gap-1 h-9 w-full transition-all duration-300 ${!isEditLocked ? 'cursor-pointer hover:bg-white/5 px-1 rounded' : ''}`}
                    onClick={(e) => {
                        e.stopPropagation();
                        if(!isEditLocked) onClick();
                    }}
                >
                    <div className="achievement-bar-wrapper">
                        <div 
                            className={`h-full transition-all duration-700 ease-out ${barColorClass}`} 
                            style={{ width: `${percentage}%` }}
                        ></div>
                        <div className="absolute inset-0 flex items-center justify-center">
                            <span className="text-[10px] font-black text-white drop-shadow-[0_1px_2px_rgba(0,0,0,0.9)] tracking-tighter">
                                {percentage}%
                            </span>
                        </div>
                    </div>
                    <div className="flex items-center gap-0.5 shrink-0 min-w-[45px] justify-end">
                        <span className={`text-[12px] font-black leading-none ${percentage === 100 ? 'text-lime-400' : 'text-white'}`}>
                            {completedNum}
                        </span>
                        <span className="text-[8px] text-slate-700 font-bold">/</span>
                        <span className="text-[11px] text-slate-500 font-black">
                            {totalNum}
                        </span>
                    </div>
                </div>
            );
        });

        const GameRow = memo(({ 
            g, index, isChild, isEditLocked, draggedId, isExpanded, hasChildren,
            personnel, nameColorMap, currencies, statusOptions,
            onToggleGroup, onOpenEdit, onStartDrag, onDrop, 
            onUpdateOrder, onAddDLC, onNest, onUnnest, onAddPersonnel, onStatusUpdate, onDelete, onRemovePersonnel,
            onOpenAchievementEdit
        }) => {
            const addedByColor = nameColorMap[g.addedBy] || '#818cf8';
            
            return (
                <React.Fragment>
                    <tr 
                        onDragOver={(e)=>e.preventDefault()} 
                        onDrop={() => !isEditLocked && onDrop(index, g.parentId || "")}
                        onDoubleClick={()=>(!isEditLocked && onOpenEdit(g))}
                        className={`hover:bg-white/[0.03] border-b border-white/5 group transition-colors ${draggedId === g.id ? 'dragging' : ''} ${isChild ? 'bg-black/20' : ''}`}>
                        
                        <td className="px-2 text-center" onClick={(e)=>e.stopPropagation()}>
                            <div className="flex flex-col items-center gap-2">
                                {!isEditLocked && (
                                    <div draggable onDragStart={() => onStartDrag(g.id, index, g.parentId || "")} className="drag-handle p-2 text-slate-700 hover:text-cyan-400"><Icon name="grip-vertical" className="w-5 h-5" /></div>
                                )}
                                {!isChild && hasChildren && (
                                    <Icon name={isExpanded ? "chevron-down" : "chevron-right"} className="w-5 h-5 text-cyan-500" onClick={()=>onToggleGroup(g.id)} />
                                )}
                            </div>
                        </td>
                        <td className={`px-0 py-8 text-center font-mono selectable-cell w-12 ${isChild ? 'dlc-indent text-slate-500' : ''}`} onClick={(e)=>e.stopPropagation()}>
                            {!isChild ? (
                                isEditLocked ? <span className="text-slate-600 group-hover:text-cyan-400 font-black text-xl block w-full text-center">{g.order || 0}</span> : 
                                <LocalNumberInput defaultValue={g.order || 0} onConfirm={(v) => onUpdateOrder(g.id, v, g.parentId || "")} className="bg-black/50 border border-slate-800 w-9 text-center rounded outline-none py-1 mx-auto block font-black text-xl" />
                            ) : null}
                        </td>
                        <td className="px-4 text-center">
                            <span style={{ color: addedByColor }} className="font-black text-[13px] bg-black/30 px-2 py-1 border border-white/5 rounded-sm">{g.addedBy || '系統'}</span>
                        </td>
                        
                        <td className="px-4 py-3">
                            <div className="w-44 h-28 bg-black border border-slate-800 mx-auto flex items-center justify-center overflow-hidden rounded-sm group-hover:border-indigo-500 p-1">
                                {g.cover ? <img src={g.cover} className="w-full h-full object-contain" /> : <Icon name="image" className="text-slate-900 w-8 h-8" />}
                            </div>
                        </td>
                        <td className="px-6 py-8 text-center selectable-cell">
                            <div className="flex flex-col items-center gap-1">
                                <div className="flex items-center gap-2">
                                    <span className={`font-black ${isChild ? 'text-lg text-slate-400' : 'text-xl'}`}>{g.name}</span>
                                    {g.url && <a href={g.url} target="_blank" onClick={(e)=>e.stopPropagation()} className="text-slate-600 hover:text-white"><Icon name="link-2" className="w-4 h-4" /></a>}
                                </div>
                                {!isEditLocked && (
                                    <div className="flex items-center gap-2 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                        {!isChild && <button onClick={(e)=>{e.stopPropagation(); onAddDLC(g.id);}} className="text-[10px] bg-indigo-900/50 px-2 py-1 rounded text-indigo-300 border border-indigo-500/20 font-bold hover:bg-indigo-600 hover:text-white transition-all">+ DLC / 擴充</button>}
                                        {!isChild && (
                                            <div 
                                                className="text-[10px] px-2 py-1 rounded border border-cyan-500/20 bg-cyan-900/20 text-cyan-400 font-bold cursor-pointer hover:bg-cyan-500 hover:text-black"
                                                onDragOver={(e)=>{e.preventDefault(); e.stopPropagation();}}
                                                onDrop={(e)=>{e.preventDefault(); e.stopPropagation(); onNest(g.id); }}
                                            ><Icon name="folder-plus" className="w-3 h-3" /> 放入分組</div>
                                        )}
                                        {isChild && <button onClick={(e)=>{e.stopPropagation(); onUnnest(g.id);}} className="text-[10px] bg-red-900/30 px-2 py-1 rounded text-red-400 font-bold">移出分組</button>}
                                    </div>
                                )}
                            </div>
                        </td>
                        <td className="px-6 text-center font-black text-2xl">
                            <span className="text-xs text-white/50 mr-1">{g.currency || 'HK$'}</span>{g.price||0}
                        </td>
                        <td className="px-1" onClick={(e)=>e.stopPropagation()}>
                            <div className="flex items-center justify-center min-h-[40px] w-full">
                                <div className="flex flex-col gap-1">
                                    {personnel.map(p => (
                                        <div key={p.id} className="flex items-center bg-black/40 p-0.5 pl-2 pr-2 rounded border border-white/5 gap-[5px] shadow-sm text-[14px] h-9 min-w-[340px] shrink-0 text-white/90">
                                            <span className="font-black truncate w-12 shrink-0 text-left" style={{ color: nameColorMap[p.userName] }}>{p.userName}</span>
                                            <select value={p.status} onChange={(e) => onStatusUpdate(g.id, p.userId, { status: e.target.value, userName: p.userName })} className="bg-slate-950 border border-white/10 rounded px-0.5 py-0.5 font-black w-[90px] shrink-0 text-[13px]">
                                                {statusOptions.map(opt => <option key={opt.id} value={opt.id}>{opt.label}</option>)}
                                            </select>
                                            
                                            {p.purchasePrice !== undefined && p.purchasePrice !== null ? (
                                                <div className="flex items-center gap-[1px] bg-black/40 px-1 rounded border border-white/5 h-full shrink-0 group/price relative">
                                                    <select value={p.purchaseCurrency || 'HK$'} onChange={(e) => onStatusUpdate(g.id, p.userId, { purchaseCurrency: e.target.value, userName: p.userName })} className="bg-transparent text-[9px] text-slate-500 w-9 font-bold appearance-none">
                                                        {currencies.map(c => <option key={c} value={c} className="bg-slate-900">{c}</option>)}
                                                    </select>
                                                    <LocalNumberInput defaultValue={p.purchasePrice || 0} onConfirm={(v) => onStatusUpdate(g.id, p.userId, { purchasePrice: v, userName: p.userName })} className="bg-transparent w-12 text-cyan-300 font-bold outline-none text-center text-[13px]" />
                                                    {!isEditLocked && <Icon name="x" className={`w-2.5 h-2.5 text-red-500 absolute -top-1 -right-1 opacity-0 group-hover/price:opacity-100 bg-black rounded-full`} onClick={() => onStatusUpdate(g.id, p.userId, { purchasePrice: null, userName: p.userName })} />}
                                                </div>
                                            ) : (
                                                !isEditLocked && <button onClick={() => onStatusUpdate(g.id, p.userId, { purchasePrice: '0', purchaseCurrency: 'HK$', userName: p.userName })} className="w-10 h-full border border-dashed border-slate-800 rounded text-slate-700 hover:text-cyan-500 hover:border-cyan-500 font-black text-xs transition-all">+ $</button>
                                            )}

                                            {p.purchasePrice2 !== undefined && p.purchasePrice2 !== null ? (
                                                <div className="flex items-center gap-[1px] bg-black/40 px-1 rounded border border-white/5 h-full shrink-0 group/price2 relative">
                                                    <select value={p.purchaseCurrency2 || currencies[4] || 'CN¥'} onChange={(e) => onStatusUpdate(g.id, p.userId, { purchaseCurrency2: e.target.value, userName: p.userName })} className="bg-transparent text-[11px] text-slate-500 w-9 font-bold appearance-none">
                                                        {currencies.map(c => <option key={c} value={c} className="bg-slate-900">{c}</option>)}
                                                    </select>
                                                    <LocalNumberInput defaultValue={p.purchasePrice2 || 0} onConfirm={(v) => onStatusUpdate(g.id, p.userId, { purchasePrice2: v, userName: p.userName })} className="bg-transparent w-12 text-lime-400 font-bold outline-none text-center text-[13px]" />
                                                    {!isEditLocked && <Icon name="x" className={`w-2.5 h-2.5 text-red-500 absolute -top-1 -right-1 opacity-0 group-hover/price2:opacity-100 bg-black rounded-full`} onClick={() => onStatusUpdate(g.id, p.userId, { purchasePrice2: null, userName: p.userName })} />}
                                                </div>
                                            ) : (
                                                !isEditLocked && <button onClick={() => onStatusUpdate(g.id, p.userId, { purchasePrice2: '0', purchaseCurrency2: currencies[4]||'CN¥', userName: p.userName })} className="w-10 h-full border border-dashed border-slate-800 rounded text-slate-700 hover:text-lime-500 hover:border-lime-500 font-black text-xs transition-all">+ $</button>
                                            )}

                                            <Icon name="trash-2" className={`w-4.5 h-4.5 text-slate-800 hover:text-red-500 shrink-0 ml-auto transition-opacity ${isEditLocked ? 'opacity-0 pointer-events-none' : 'opacity-100'}`} onClick={() => onRemovePersonnel(p.id, p.userName)} />
                                        </div>
                                    ))}
                                    {personnel.length === 0 && <div className="text-slate-800 text-[11px] italic py-2 text-center border border-dashed border-white/5 rounded w-[340px]">EMPTY MATRIX</div>}
                                </div>
                            </div>
                        </td>
                        <td className="px-4 text-center">
                            <div className="flex flex-col gap-1.5 items-center w-full min-w-[200px]">
                                {personnel.map(p => (
                                    <AchievementBar 
                                        key={p.id} 
                                        completed={p.achCompleted} 
                                        total={p.achTotal} 
                                        isEditLocked={isEditLocked} 
                                        onClick={() => onOpenAchievementEdit(g, p)} 
                                    />
                                ))}
                                {personnel.length === 0 && <div className="h-9"></div>}
                            </div>
                        </td>
                        <td className="px-4 text-center">
                            <div className="flex items-center justify-center gap-3">
                                <button onClick={(e)=>{e.stopPropagation(); onDelete(g);}} className={`text-slate-800 hover:text-red-500 transition-all active:scale-90 ${isEditLocked ? 'opacity-0 pointer-events-none' : 'opacity-100'}`} title="刪除遊戲">
                                    <Icon name="trash-2" className="w-5 h-5" />
                                </button>
                                {!isEditLocked && (
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); onAddPersonnel(g.id); }} 
                                        className="text-slate-600 hover:text-cyan-400 transition-all active:scale-90" 
                                        title="添加成員"
                                    >
                                        <Icon name="user-plus" className="w-5 h-5" />
                                    </button>
                                )}
                            </div>
                        </td>
                    </tr>
                </React.Fragment>
            );
        });

        function App() {
            const [user, setUser] = useState(null);
            const [onlineUsers, setOnlineUsers] = useState([]);
            const [activityLogs, setActivityLogs] = useState([]);
            const [isLoadingLogs, setIsLoadingLogs] = useState(true);
            const [isLoadingGames, setIsLoadingGames] = useState(true);
            const [userName, setUserName] = useState('載入中...');
            const [userColor, setUserColor] = useState('#22d3ee');
            const [isEditingName, setIsEditingName] = useState(false);
            const [games, setGames] = useState([]); 
            const [allUserStatuses, setAllUserStatuses] = useState([]); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null); 
            const [formData, setFormData] = useState({ name: '', addedBy: '', price: '0', currency: 'HK$', url: '', cover: null, parentId: '' });
            const [notification, setNotification] = useState(null);
            const [searchQuery, setSearchQuery] = useState(''); 
            const [isEditLocked, setIsEditLocked] = useState(true);
            const [isLocalMode, setIsLocalMode] = useState(() => safeGetStorage('steam_local_mode', false));
            const [expandedGroups, setExpandedGroups] = useState(new Set());
            const [newPersonnelInput, setNewPersonnelInput] = useState({ gameId: null, name: '', manualName: '' });
            const [sortConfig, setSortConfig] = useState({ key: 'order', direction: 'asc' });
            const [draggedId, setDraggedId] = useState(null);
            const [draggedIdx, setDraggedIdx] = useState(null);
            const [draggedParentId, setDraggedParentId] = useState("");
            const [activeFilter, setActiveFilter] = useState(null);
            const [isStatusSettingsOpen, setIsStatusSettingsOpen] = useState(false);
            const [isRateSettingsOpen, setIsRateSettingsOpen] = useState(false);
            const [statusLabels, setStatusLabels] = useState([
                { id: 'unbought', label: '願望清單', color: '#ffffff' },
                { id: 'bought', label: '已購買', color: '#67e8f9' },
                { id: 'playing', label: '遊玩中', color: '#f0abfc' },
                { id: 'completed', label: '已完成', color: '#bef264' }
            ]);
            
            // 匯率資料結構改進為物件：Key 為符號，Value 為匯率
            const [rates, setRates] = useState({ 'CN¥': 0.92, 'РУБ': 11.5, 'INR': 10.5 });
            
            // 動態計算可用幣種，保留基本的 HK$, NT$, US$, JP¥
            const currencies = useMemo(() => {
                const base = ["HK$", "NT$", "US$", "JP¥"];
                const custom = Object.keys(rates);
                return [...new Set([...base, ...custom])];
            }, [rates]);

            const [showNormalizeConfirm, setShowNormalizeConfirm] = useState(false);
            const [showClearConfirm, setShowClearConfirm] = useState(false);
            const [removePersonTarget, setRemovePersonTarget] = useState(null);
            const [deleteGameTarget, setDeleteGameTarget] = useState(null);
            const [achievementEdit, setAchievementEdit] = useState({ gameId: null, userId: null, completed: '', total: '', name: '', memberName: '' });

            const [isPageVisible, setIsPageVisible] = useState(true);

            const importInputRef = useRef(null);
            const fileInputRef = useRef(null);

            const paths = useMemo(() => ({

                    setGames(prev => {
                        const updated = [...prev];
                        const siblings = updated.filter(g => (g.parentId || "") === pId).sort((a, b) => (a.order || 0) - (b.order || 0));
                        siblings.forEach(g => { if (g.id !== id && (g.order || 0) >= order) g.order = (g.order || 0) + 1; });
                        const target = updated.find(g => g.id === id);
                        if (target) target.order = order;
                        return updated;
                    });
                    return;
                }
                if (!db) return;
                try {
                    const batch = db.batch();
                    const siblings = games.filter(g => (g.parentId || "") === pId).sort((a, b) => (a.order || 0) - (b.order || 0));
                    siblings.forEach(g => { if (g.id !== id && (g.order || 0) >= order) batch.update(db.collection(paths.games).doc(g.id), { order: (g.order || 0) + 1 }); });
                    batch.update(db.collection(paths.games).doc(id), { order });
                    await batch.commit();
                    showNotify("編號已更新且整體順延");

            const handleNormalizeOrders = async () => {
                if (isLocalMode) {
                    setGames(prev => {
                        const updated = [...prev];
                        const roots = updated.filter(g => !g.parentId).sort((a, b) => (a.order || 0) - (b.order || 0));
                        roots.forEach((g, idx) => g.order = idx + 1);
                        const parentIds = new Set(updated.filter(g => g.parentId).map(g => g.parentId));
                        parentIds.forEach(pId => {
                            const children = updated.filter(g => g.parentId === pId).sort((a, b) => (a.order || 0) - (b.order || 0));
                            children.forEach((c, idx) => c.order = idx + 1);
                        });
                        return updated;
                    });
                    setShowNormalizeConfirm(false); return;
                }
                if (!db) return;
                try {
                    const batch = db.batch();
                    const sortedRoots = [...games.filter(g => !g.parentId)].sort((a, b) => (a.order || 0) - (b.order || 0));
                    sortedRoots.forEach((g, idx) => { batch.update(db.collection(paths.games).doc(g.id), { order: idx + 1 }); });
                    const parents = new Set(games.filter(g => g.parentId).map(g => g.parentId));
                    parents.forEach(pId => {
                        const sortedChildren = games.filter(g => g.parentId === pId).sort((a, b) => (a.order || 0) - (b.order || 0));
                        sortedChildren.forEach((child, idx) => { batch.update(db.collection(paths.games).doc(child.id), { order: idx + 1 }); });
                    });
                    await batch.commit();
                    showNotify("編號已重新校正且補齊"); setShowNormalizeConfirm(false);

                    setGames(prev => {
                        const updated = [...prev];
                        const siblings = updated.filter(g => (g.parentId || "") === targetParentId).sort((a, b) => (a.order || 0) - (b.order || 0));

                    setDraggedId(null); return;

                const batch = db.batch();

            const statusOptions = useMemo(() => { return statusLabels.map(l => ({ id: l.id, label: l.label })); }, [statusLabels]);

            const hierarchy = useMemo(() => {
                let list = [...games];
                if (activeFilter) {
                    const matchedIds = allUserStatuses.filter(s => s.userName === activeFilter.userName && s.status === activeFilter.statusId).map(s => s.gameId);
                    list = list.filter(g => matchedIds.includes(g.id));
                }
                if (searchQuery.trim()) { const q = searchQuery.toLowerCase(); list = list.filter(g => (g.name || "").toLowerCase().includes(q)); }
                list.sort((a, b) => {
                    let valA = a[sortConfig.key]; let valB = b[sortConfig.key];
                    if (sortConfig.key === 'order') { valA = parseInt(valA)||0; valB = parseInt(valB)||0; } 
                    else { valA = (valA||"").toString().toLowerCase(); valB = (valB||"").toString().toLowerCase(); }
                    return valA < valB ? (sortConfig.direction === 'asc' ? -1 : 1) : (sortConfig.direction === 'asc' ? 1 : -1);
                });
                const roots = list.filter(g => !g.parentId);
                const children = {};
                list.filter(g => g.parentId).forEach(g => { if (!children[g.parentId]) children[g.parentId] = []; children[g.parentId].push(g); });
                Object.keys(children).forEach(pId => { children[pId].sort((a, b) => (parseInt(a.order)||0) - (parseInt(b.order)||0)); });

            useEffect(() => {

            useEffect(() => {
                if (!isClient || !user || !db || !isPageVisible || isLocalMode) return;
                let activeUnsubscribers = [];
                const handleError = (err) => { if (err.code === 'resource-exhausted') showNotify("⚠️ 配額超出，已暫停同步。"); };
                const unsubG = db.collection(paths.games).onSnapshot(snap => {
                    setGames(prevGames => {
                        let newGames = [...prevGames];
                        snap.docChanges().forEach(change => {
                            const data = { id: change.doc.id, ...change.doc.data() };
                            if (change.type === "added") { if (!newGames.find(g => g.id === data.id)) newGames.push(data); } 
                            else if (change.type === "modified") { const idx = newGames.findIndex(g => g.id === data.id); if (idx > -1) newGames[idx] = data; } 
                            else if (change.type === "removed") { newGames = newGames.filter(g => g.id !== data.id); }
                        }); return newGames;
                    }); setIsLoadingGames(false);
                }, handleError);
                activeUnsubscribers.push(unsubG);
                const unsubS = db.collection(paths.statuses).onSnapshot(snap => {
                    setAllUserStatuses(prevStatuses => {
                        let newStatuses = [...prevStatuses];
                        snap.docChanges().forEach(change => {
                            const data = { id: change.doc.id, ...change.doc.data() };
                            if (change.type === "added") { if (!newStatuses.find(s => s.id === data.id)) newStatuses.push(data); } 
                            else if (change.type === "modified") { const idx = newStatuses.findIndex(s => s.id === data.id); if (idx > -1) newStatuses[idx] = data; } 
                            else if (change.type === "removed") { newStatuses = newStatuses.filter(s => s.id !== data.id); }
                        }); return newStatuses;
                    });
                }, handleError);
                activeUnsubscribers.push(unsubS);
                activeUnsubscribers.push(db.collection(paths.presence).onSnapshot(snap => {
                    const list = []; const now = Date.now();
                    snap.forEach(doc => { const d = doc.data(); if (d.lastSeen && (now - d.lastSeen.toMillis() < 300000)) list.push(d); });
                    setOnlineUsers(list);
                }, handleError));
                activeUnsubscribers.push(db.collection(paths.logs).onSnapshot(snap => {
                    const logs = []; snap.forEach(doc => logs.push({ id: doc.id, ...doc.data() }));
                    logs.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                    setActivityLogs(logs.slice(0, 30)); setIsLoadingLogs(false);
                }, handleError));
                activeUnsubscribers.push(db.collection(paths.settings).doc('labels').onSnapshot(doc => { if (doc.exists && doc.data().list) setStatusLabels(doc.data().list); }, handleError));
                activeUnsubscribers.push(db.collection(paths.settings).doc('rates').onSnapshot(doc => { if (doc.exists) setRates(doc.data()); }, handleError));

                                <button 
                                    onClick={() => setRates(prev => ({...prev, [`NEW${Date.now().toString().slice(-4)}`]: 1}))}
                                    className="w-full py-3 mb-6 border border-dashed border-lime-500/30 text-lime-500 hover:bg-lime-500/5 font-black rounded transition-all uppercase text-xs"
                                >
                                    + 新增幣種設定
                                </button>

                                <div className="flex gap-4">
                                    <button onClick={() => setIsRateSettingsOpen(false)} className="flex-1 py-3 bg-slate-900 font-black rounded text-xs uppercase">取消</button>
                                    <button onClick={handleUpdateRates} className="flex-1 py-3 bg-lime-600 text-black font-black rounded text-xs uppercase">保存匯率</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {achievementEdit.gameId && (
                        <div className="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onClick={() => setAchievementEdit({ gameId: null, userId: null, completed: '', total: '', name: '', memberName: '' })}>
                            <div className="bg-[#0b0e14] border border-amber-500/30 w-full max-w-sm p-8 rounded shadow-2xl relative text-center" onClick={(e) => e.stopPropagation()}>
                                <div className="absolute top-0 left-0 w-full h-1 bg-amber-500"></div><h3 className="text-xl font-black mb-1 text-amber-400 italic underline decoration-amber-500/30 decoration-4">成就數據同步</h3><p className="text-[10px] text-slate-500 mb-6 font-bold truncate opacity-60 uppercase">{achievementEdit.name} - [{achievementEdit.memberName}]</p>
                                <div className="grid grid-cols-2 gap-4 mb-8 text-center">
                                    <div className="flex flex-col gap-1.5"><label className="text-[11px] font-black text-slate-400 uppercase tracking-widest">完成數</label><input type="number" placeholder="0" className="w-full bg-black/60 border border-slate-800 p-3 rounded text-cyan-400 font-black text-2xl outline-none focus:border-cyan-500/50 transition-all text-center" value={achievementEdit.completed === '0' || achievementEdit.completed === 0 ? '' : (achievementEdit.completed || '')} onChange={e => setAchievementEdit({...achievementEdit, completed: e.target.value})} /></div>
                                    <div className="flex flex-col gap-1.5"><label className="text-[11px] font-black text-slate-400 uppercase tracking-widest">總成就數</label><input type="number" placeholder="0" className="w-full bg-black/60 border border-slate-800 p-3 rounded text-white font-black text-2xl outline-none focus:border-slate-600 transition-all text-center" value={achievementEdit.total === '0' || achievementEdit.total === 0 ? '' : (achievementEdit.total || '')} onChange={e => setAchievementEdit({...achievementEdit, total: e.target.value})} /></div>
                                </div>
                                <div className="flex gap-4"><button onClick={() => setAchievementEdit({ gameId: null, userId: null, completed: '', total: '', name: '', memberName: '' })} className="flex-1 py-3 bg-slate-900 text-[12px] font-black rounded border border-white/5 uppercase">放棄</button><button onClick={handleUpdateAchievements} className="flex-1 py-3 bg-amber-600 text-black text-[12px] font-black rounded shadow-lg active:scale-95 uppercase">確認修改</button></div>
                            </div>
                        </div>
                    )}

                    {isStatusSettingsOpen && (
                        <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                            <div className="bg-[#0b0e14] border border-cyan-500/30 w-full max-w-xl p-8 rounded shadow-2xl">
                                <h3 className="text-2xl font-black mb-6 italic text-cyan-400 uppercase tracking-widest">狀態分組與顏色設定</h3>
                                <div className="space-y-4 max-h-[450px] overflow-y-auto custom-scrollbar pr-2 mb-6">
                                    {statusLabels.map((item, index) => (
                                        <div key={item.id} className="flex items-center gap-3 bg-black/40 p-3 rounded border border-white/5 group">
                                            <div className="flex flex-col items-center gap-1 shrink-0"><div className="text-[9px] font-black text-slate-600 uppercase">顏色</div><input type="color" className="w-10 h-10 bg-transparent cursor-pointer rounded" value={item.color || '#ffffff'} onChange={e => { const newList = [...statusLabels]; newList[index].color = e.target.value; setStatusLabels(newList); }} /></div>
                                            <div className="flex-grow flex flex-col gap-1"><div className="text-[9px] font-black text-slate-600 uppercase">標籤名稱</div><input className="w-full bg-black border border-slate-800 p-2 rounded text-white outline-none focus:border-cyan-400 font-bold" style={{ color: item.color }} value={item.label || ''} onChange={e => { const newList = [...statusLabels]; newList[index].label = e.target.value; setStatusLabels(newList); }} /></div>
                                            <button onClick={() => { if(statusLabels.length > 1) setStatusLabels(statusLabels.filter(l => l.id !== item.id)); }} className="text-slate-600 hover:text-red-500 transition-colors pt-4"><Icon name="trash-2" className="w-6 h-6" /></button>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setStatusLabels([...statusLabels, { id: `status_${Date.now()}`, label: '新分組', color: '#ffffff' }])} className="w-full py-4 mb-8 border border-dashed border-cyan-500/30 text-cyan-500 hover:bg-cyan-500/5 font-black rounded transition-all uppercase">+ 新增狀態分組</button>
                                <div className="flex gap-4"><button onClick={() => setIsStatusSettingsOpen(false)} className="flex-1 py-4 bg-slate-900 font-black rounded uppercase">取消</button><button onClick={handleUpdateLabels} className="flex-1 py-4 bg-cyan-600 text-black font-black rounded uppercase">儲存更新</button></div>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
                            <div className="bg-[#0b0e14] border border-white/5 w-full max-w-xl overflow-hidden relative shadow-2xl rounded-sm"><div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-indigo-600"></div><button onClick={closeModal} className="absolute right-4 top-4 text-slate-600 hover:text-white transition-all z-10"><Icon name="x" className="w-5 h-5" /></button>
                                <div className="p-6 md:p-8"><div className="mb-6 -ml-2 flex items-baseline gap-4"><h3 className="text-2xl font-black italic tracking-tighter underline decoration-cyan-400/30 decoration-4"><span>{editingId ? '修改' : '錄入'}</span><span className="text-cyan-400 ml-2">{formData.parentId ? 'DLC 擴充' : '數據庫'}</span></h3><div className="h-0.5 flex-grow bg-white/5"></div></div>
                                    <form onSubmit={handleSaveGame} className="space-y-4">
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                                            <div className="md:col-span-4 flex flex-col items-center justify-start"><div onClick={() => fileInputRef.current.click()} className="w-full max-w-[120px] aspect-[3/4.2] bg-black border border-slate-800 rounded flex flex-col items-center justify-center cursor-pointer overflow-hidden relative group hover:border-cyan-400 transition-all shadow-xl">{formData.cover ? <img src={formData.cover} className="w-full h-full object-cover" /> : <div className="flex flex-col items-center gap-2 text-slate-700 group-hover:text-cyan-500"><Icon name="camera" className="w-6 h-6" /><span className="text-[9px] font-black uppercase text-center px-2">貼上封面<br/>(CTRL+V)</span></div>}</div><input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={async (e)=>{ if(e.target.files[0]) { const c = await compressImage(URL.createObjectURL(e.target.files[0])); setFormData(p=>({...p, cover: c})); } }} /></div>
                                            <div className="md:col-span-8 space-y-3">
                                                <div className="modal-field-container"><label className="text-[12px] font-black text-indigo-400">提起人</label><select className="modal-input-base w-full font-black text-white text-sm" value={formData.addedBy || ''} onChange={e=>setFormData({...formData, addedBy: e.target.value})}><option value="">選擇人員...</option>{tableMemberNames.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                                                <div className="modal-field-container items-start"><label className="text-[12px] font-black text-indigo-400 mt-2.5">遊戲名稱</label><textarea required rows="2" placeholder="輸入名稱..." className="modal-input-base w-full text-lg font-black resize-none leading-snug" value={formData.name || ''} onChange={e=>setFormData({...formData, name: e.target.value})} /></div>
                                                <div className="modal-field-container"><label className="text-[12px] font-black text-indigo-400">商店網址</label><input className="modal-input-base w-full text-[10px] font-mono text-cyan-400" placeholder="https://store.steampowered.com/..." value={formData.url || ''} onChange={e=>setFormData({...formData, url: e.target.value})} /></div>
                                                <div className="modal-field-container"><label className="text-[12px] font-black text-indigo-400">價格設定</label><div className="flex w-fit items-stretch rounded bg-black/40 border-b-2 border-slate-800"><select className="bg-transparent font-black text-indigo-400 outline-none p-2 text-sm appearance-none" value={formData.currency || 'HK$'} onChange={e=>setFormData({...formData, currency: e.target.value})}>{currencies.map(c => <option key={c} value={c} className="bg-[#0b0e14]">{c}</option>)}</select><input type="number" placeholder="0" className="bg-transparent p-2 text-xl font-black outline-none text-white w-28" value={formData.price === '0' || formData.price === 0 ? '' : (formData.price || '')} onChange={e=>setFormData({...formData, price: e.target.value})} /></div></div>
                                            </div>
                                        </div><div className="pt-4 flex gap-4"><button type="button" onClick={closeModal} className="flex-1 py-3 bg-slate-900 text-[12px] font-black rounded border border-white/5 uppercase">放棄更改</button><button type="submit" className="flex-[2] py-3 bg-cyan-600 text-black text-[12px] font-black rounded shadow-lg uppercase">確認錄入</button></div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {newPersonnelInput.gameId && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center bg-black/80 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-indigo-500 p-6 rounded shadow-2xl w-80"><h4 className="text-indigo-400 font-black mb-4 uppercase tracking-widest">添加遊戲人員</h4><select autoFocus className="w-full bg-black border border-slate-700 p-3 rounded mb-4 text-white outline-none font-black" value={newPersonnelInput.name || ''} onChange={e => setNewPersonnelInput({...newPersonnelInput, name: e.target.value})}><option value="">- 請選擇人員 -</option>{tableMemberNames.map(m => <option key={m} value={m}>{m}</option>)}<option value="_manual_">- 手動輸入 -</option></select>
                                {newPersonnelInput.name === "_manual_" && <input className="w-full bg-black border border-slate-700 p-3 rounded mb-4 text-white outline-none focus:border-cyan-400" placeholder="輸入名稱..." autoFocus value={newPersonnelInput.manualName || ''} onChange={e => setNewPersonnelInput({...newPersonnelInput, manualName: e.target.value})} />}
                                <div className="flex gap-2"><button onClick={() => setNewPersonnelInput({gameId: null, name: '', manualName: ''})} className="flex-1 py-2 bg-slate-800 text-xs font-black rounded uppercase">取消</button><button onClick={async () => { let n = newPersonnelInput.name === "_manual_" ? newPersonnelInput.manualName : newPersonnelInput.name; n = n?.trim(); if(!n) return; await handleStatusUpdate(newPersonnelInput.gameId, isLocalMode ? `local_user_${Date.now()}` : `user_${Date.now()}`, { userName: n, status: statusLabels[0].id, purchasePrice: '0', purchaseCurrency: currencies[0], achTotal: 0, achCompleted: 0 }); setNewPersonnelInput({ gameId: null, name: '', manualName: '' }); }} className="flex-1 py-2 bg-indigo-600 text-xs font-black rounded uppercase">確認添加</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
